<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Playzi - Reinitialisation du mot de passe</title>
</head>

<body style="margin:0;padding:0;background:#f4f7f7;font-family:Inter,Segoe UI,Arial,sans-serif;color:#2b2f4a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
          style="max-width:560px;background:#ffffff;border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(17,24,39,0.08);">
          <tr>
            <td style="font-size:34px;line-height:1;font-weight:800;letter-spacing:-0.02em;color:#2b2f4a;">
              Playzi<span style="color:#16b885;">.</span>
            </td>
          </tr>
          <tr>
            <td style="height:18px;"></td>
          </tr>
          <tr>
            <td style="font-size:24px;font-weight:800;color:#20253f;">
              Reinitialise ton mot de passe
            </td>
          </tr>
          <tr>
            <td style="height:10px;"></td>
          </tr>
          <tr>
            <td style="font-size:15px;line-height:1.6;color:#5f677b;">
              Tu as demande la reinitialisation de ton mot de passe Playzi.
            </td>
          </tr>
          <tr>
            <td style="height:24px;"></td>
          </tr>
          <tr>
            <td align="center">
              <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/reset-password"
                style="display:inline-block;background:#16b885;color:#ffffff;text-decoration:none;font-weight:700;padding:13px 22px;border-radius:12px;">
                Reinitialiser mon mot de passe
              </a>
            </td>
          </tr>
          <tr>
            <td style="height:22px;"></td>
          </tr>
          <tr>
            <td style="font-size:13px;line-height:1.6;color:#7a8296;">
              Si tu n'es pas a l'origine de cette demande, tu peux ignorer cet email.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
